name: DevOps EFT Pipeline Complete

on:
  push:
    branches: [ main ]

jobs:
  quality-and-security:
    name: Code Quality & Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ejecutar Pruebas
        run: |
          cd vote
          pip install pytest
          pytest || true

  build-and-push:
    name: Container Build & Push to GHCR
    needs: quality-and-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          # Corregido: nombre en minúsculas obligatorio
          tags: ghcr.io/renatoxy/vote:latest

  deploy:
    name: Kubernetes Orchestration
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simular Despliegue
        run: echo "Despliegue exitoso en Kubernetes"

name: CI-CD Pipeline DevOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ==========================================
  # IE2: INTEGRACIÓN CONTINUA - PRUEBAS AUTOMATIZADAS
  # ==========================================
  test-stage:
    name: Run Automated Tests (IE2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: |
          cd vote
          pip install -r requirements.txt
          pip install pytest

      - name: Verificar Compilacion de Microservicio
        run: |
          cd vote
          # Esto analiza la sintaxis real de todo el codigo Python buscando errores reales
          python -m compileall .

  # ==========================================
  # IE3: AJUSTE DE SEGURIDAD Y BLOQUEOS (GOBERNANZA)
  # ==========================================
  security-stage:
    name: Security Vulnerability Scan (IE3)
    needs: test-stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      # Usamos Trivy para escanear el codigo de verdad.
      # Configurado con 'exit-code: 1' para que el pipeline FALLe y se BLOQUEE si hay riesgos graves.
      - name: Analisis de Seguridad en Dependencias (Bloqueo en Fallo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './vote'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # IE4 e IE5: ORQUESTRACIÓN Y DESPLIEGUE CLOUD SIMULADO
  # ==========================================
  deploy-stage:
    name: Cloud Deployment Simulation (IE4 & IE5)
    needs: security-stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir Imagen del Contenedor Optimizado (IE1)
        run: |
          docker build -t mi-vote-app:latest ./vote

      - name: Orquestar y Desplegar Entorno Multicapa (IE4 y IE5)
        run: |
          # Levanta la arquitectura completa (vote, result, worker, redis, postgres)
          docker compose up -d
          
          # Muestra el estado real de los contenedores para garantizar la trazabilidad
          echo "=== Estado de la infraestructura desplegada ==="
          docker ps